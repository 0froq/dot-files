# File path: tmux/tmux.conf
# Optimized tmux configuration - Clean, minimal, performant
# Last modified: 2026-03-11 16:40:21

# =====================================================
# PREFIX & BASIC SETTINGS
# =====================================================
unbind -a                        # Unbind all default keybindings
set -g prefix M-t                # Prefix: M-t (home row friendly)
set -g mouse on                  # Mouse support
set -g escape-time 0             # Zero escape delay
set -g repeat-time 1000          # Repeat timeout
set -g history-limit 50000       # Large scrollback buffer

# Terminal support
set -g default-terminal "tmux-256color"
set -sa terminal-overrides ',*:RGB'

# Indexing from 1
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
setw -g automatic-rename on

# Focus events for nvim
set -g focus-events on

# =====================================================
# STATUS BAR - Minimal & Informative
# =====================================================
set -g status on
set -g status-justify left
set -g status-left ''
set -g status-right '#[fg=brightblack bg=brightwhite bold] #S '
set -g status-right-length 30
set -g status-interval 1

set -g status-style '\
#{?client_prefix,bg=brightblack,bg=default}'

# Window status: theme colors + basename + editor markers
set -g window-status-format '\
#{?window_bell_flag,\
#[fg=red],\
#{?window_zoomed_flag,\
#[fg=yellow],\
#[fg=white]\
}}\
 #{b:pane_current_path} '

# Current window: bright background, consistent markers
set -g window-status-current-format '\
#{?window_bell_flag,\
#[fg=brightblack bg=red],\
#{?window_zoomed_flag,\
#[fg=brightblack bg=yellow],\
#[fg=brightblack bg=brightwhite]\
}}\
 #{b:pane_current_path} '

set -g window-status-bell-style 'fg=red'
set -g window-status-separator ' '

# =====================================================
# PANE BORDERS & STATUS
# =====================================================
set -g pane-border-status top
set -g pane-border-format ' #{pane_current_path} '
set -g pane-border-style fg=brightblack
set -g pane-active-border-style fg=brightwhite

# =====================================================
# SPLIT PANE - Current Directory
# =====================================================
bind \\ split-window -h -c "#{pane_current_path}"
bind |  split-window -v -c "#{pane_current_path}"

# =====================================================
# KEY BINDINGS - Intuitive & Efficient
# =====================================================

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display-message 'Config reloaded!'

# Window management
bind t new-window -c "#{pane_current_path}"
bind w kill-window
bind q kill-pane
bind 1 select-window -t :1
bind 2 select-window -t :2
bind 3 select-window -t :3
bind 4 select-window -t :4
bind 5 select-window -t :5
bind 6 select-window -t :6
bind 7 select-window -t :7
bind 8 select-window -t :8
bind 9 select-window -t :9

# Pane navigation
# bind h select-pane -L
# bind j select-pane -D
# bind k select-pane -U
# bind l select-pane -R

# bind -n 'C-h' select-pane -L
# bind -n 'C-j' select-pane -D
# bind -n 'C-k' select-pane -U
# bind -n 'C-l' select-pane -R

# Pane resize
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Zoom
bind Enter resize-pane -Z

# Copy mode
bind v copy-mode

# Command prompt
bind : command-prompt

# Sessions
bind s choose-session
bind R command-prompt -I "#S" { rename-session "%%" }

# Tree navigation
bind Space choose-tree -Zw

# =====================================================
# COPY MODE - Vi Keys
# =====================================================
set-window-option -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# =====================================================
# NAVIGATION INTEGRATION
# =====================================================
# Smart pane switching with awareness of Vim splits.
# See: https://github.com/christoomey/vim-tmux-navigator
vim_pattern='(\S+/)?g?\.?(view|l?n?vim?x?|fzf)(diff)?(-wrapped)?'
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +${vim_pattern}$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'
tmux_version='$(tmux -V | sed -En "s/^tmux ([0-9]+(.[0-9]+)?).*/\1/p")'
if-shell -b '[ "$(echo "$tmux_version < 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\'  'select-pane -l'"
if-shell -b '[ "$(echo "$tmux_version >= 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\\\'  'select-pane -l'"

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R

# =====================================================
# PLUGINS - Minimal Set
# =====================================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# Initialize TPM (must be last)
run '~/.tmux/plugins/tpm/tpm'
