# File path: tmux/tmux.conf
# Last modified: 2026-03-05 12:02:40

# Unbind all keybindings
unbind -a

# Prefix key
unbind C-b
set -g prefix M-t
# NOTE: Incidentally it works great in home row mods and colemak


# QoL
set -g mouse on
set -g escape-time 0
set -g repeat-time 1000
set -g history-limit 5000

# Ensure that the terminal supports 256 colors and true color
set -g default-terminal "tmux-256color"
set -sa terminal-overrides ',*:RGB'

# Status bar settings

# ── Status Bar ──────────────────────────────────────────────────
set -g status-style         'bg=default,fg=white'
set -g status-position      bottom
set -g status-interval      1

# 左侧：prefix 激活时变色提示，平时空
set -g status-left \
  '#{?client_prefix,#[fg=#ff9e64 bold]⌨ ,}'

# 右侧：zoom 状态 + session name
set -g status-right \
  '#{?window_zoomed_flag,#[fg=yellow bold],#[fg=white bright nobold]}#S'

# ── Window Status ────────────────────────────────────────────────

# window list 居中

# ── Pane Border ──────────────────────────────────────────────────
#
# set -g status-style bg=default,fg=white
# set -g status-left ''
# set -g status-right '#[fg=white,bright,nobold]#S'
#
#
# set -g status-left "\
# #{?#{==:#{client_key_table},goto},#[bg=#9ece6a fg=#1a1b26 bold] GOTO ,\
# #{?client_prefix,#[bg=#ff9e64 fg=#1a1b26 bold] PREFIX ,\
# #{?#{==:#{client_key_table},rename},#[bg=#bb9af7 fg=#1a1b26 bold] RENAME ,\
# #[bg=#3d59a1 fg=#c0caf5] #S \
# }}}"
#
set -g window-status-format         '○'
set -g window-status-current-format '●'
set -g window-status-style \
       '#{?window_zoomed_flag,fg=yellow,fg=white}'
set -g window-status-current-style \
      '#{?window_zoomed_flag,fg=yellow,fg=brightwhite}'
set -g window-status-bell-style     'fg=red blink'

# Start numbering windows and panes from 1
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on

# set -g mode-style "fg=default,bg=default,reverse"

setw -g automatic-rename off

# Pane border styles
set -g pane-border-style fg=brightblack
set -g pane-active-border-style fg=brightwhite

set -g focus-events on

##### Key bindings #####
# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display-message 'Tmux config reloaded!'

# Split pane
bind \\ split-window -h
bind | split-window -v

# Zoom in(maximize) pane
bind Enter resize-pane -Z

# Navigate pane
bind Left select-pane -L
bind Down select-pane -D
bind Up select-pane -U
bind Right select-pane -R

bind -n 'C-h' select-pane -L
bind -n 'C-j' select-pane -D
bind -n 'C-k' select-pane -U
bind -n 'C-l' select-pane -R

bind -T copy-mode-vi 'C-h' select-pane -L
bind -T copy-mode-vi 'C-j' select-pane -D
bind -T copy-mode-vi 'C-k' select-pane -U
bind -T copy-mode-vi 'C-l' select-pane -R

# Navigate window
bind 1 select-window -t 1
bind 2 select-window -t 2
bind 3 select-window -t 3
bind 4 select-window -t 4
bind 5 select-window -t 5
bind 6 select-window -t 6
bind 7 select-window -t 7
bind 8 select-window -t 8
bind 9 select-window -t 9

# Resize pane
bind -r < resize-pane -L 5
bind -r > resize-pane -R 5
bind -r + resize-pane -U 5
bind -r _ resize-pane -D 5

# Window / Pane management
bind t new-window
bind w kill-window
bind q kill-pane

# Enter copy mode
bind v copy-mode

# Sessions
bind s choose-session

# prefix + g 进入自定义的 "goto" table
bind g switch-client -T goto

# 然后在 goto table 里绑定第二个键
bind-key -T goto h select-pane -L
bind-key -T goto l select-pane -R
bind-key -T goto j select-pane -D
bind-key -T goto k select-pane -U

# # 终端快速启动 & Neovim 集成可选（会自动分屏打开 nvim）
# bind n split-window -v "nvim"
# bind t split-window -v "zsh"
# bind r source-file ~/.tmux.conf \; display-message 'Tmux config reloaded!'
#
# # 复制模式 & 鼠标选区
# setw -g mode-keys vi
# bind-key -T copy-mode-vi 'v' send -X begin-selection
# bind-key -T copy-mode-vi 'y' send -X copy-selection-and-cancel
# Select node from tree
bind Space choose-tree -Zw

# Rename session
bind R command-prompt -I "#S" { rename-session "%%" }

set -g @vim_navigator_mapping_left "C-h"
set -g @vim_navigator_mapping_right "C-l"
set -g @vim_navigator_mapping_up "C-k"
set -g @vim_navigator_mapping_down "C-j"

# Basic settings

set-window-option -g mode-keys vi

bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

#
# # 插件推荐
# # tmux-resurrect、tmux-continuum 自动保存/恢复会话
# # tmux-yank 与系统剪贴板集成

# 极简美化的 statusline（无时间/日期）
# set -g status on
# set -g status-justify centre
# # set -g status-style "bg=colour236,fg=colour250"
# set -g window-status-format " #I #W "
# # set -g window-status-style "bg=colour236,fg=colour245"
# set -g window-status-current-format " #I #W "
# # set -g window-status-current-style "bg=colour39,fg=colour231,bold"
# set -g status-left " #[bold]#I "
# set -g status-right ""
# List of plugins

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
